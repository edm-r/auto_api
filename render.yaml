databases:
  - name: auto-api-db
    plan: free
    region: oregon

services:
  - type: web
    name: auto-api
    env: python
    plan: free
    region: oregon
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn auto_api.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: DJANGO_SETTINGS_MODULE
        value: auto_api.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: auto-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: auto-api-db
          property: connectionString
